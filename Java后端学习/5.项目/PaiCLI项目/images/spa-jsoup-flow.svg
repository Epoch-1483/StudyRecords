<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 470" width="100%" role="img">
<defs>
  <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect width="680" height="470" fill="#f8f9fa"/>
<text x="340" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#1f3a5f" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">SSR 静态页 vs SPA 页面：Jsoup 能拿到什么</text>
<text x="340" y="54" text-anchor="middle" font-size="11" fill="#666" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">Jsoup 只解析静态 HTML 字符串，不会执行 JavaScript</text>

<!-- ===== SSR 流程 ===== -->
<text x="40" y="88" font-size="13" font-weight="600" fill="#1a56a8" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">SSR / 静态页（服务端已渲染好正文）</text>

<rect x="45" y="100" width="140" height="42" rx="8" fill="#e8f0fe" stroke="#1a56a8" stroke-width="1.2"/>
<text x="115" y="124" text-anchor="middle" font-size="12" fill="#1a56a8" font-weight="600" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">OkHttp 请求 URL</text>

<line x1="186" y1="121" x2="198" y2="121" stroke="#888780" stroke-width="1.5" marker-end="url(#a)"/>

<rect x="202" y="94" width="158" height="54" rx="8" fill="#d2e3fc" stroke="#1a56a8" stroke-width="1.2"/>
<text x="281" y="115" text-anchor="middle" font-size="12" fill="#1a56a8" font-weight="600" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">返回完整 HTML</text>
<text x="281" y="135" text-anchor="middle" font-size="10.5" fill="#444" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">（正文已在 HTML 里）</text>

<line x1="361" y1="121" x2="373" y2="121" stroke="#888780" stroke-width="1.5" marker-end="url(#a)"/>

<rect x="377" y="100" width="130" height="42" rx="8" fill="#e8f0fe" stroke="#1a56a8" stroke-width="1.2"/>
<text x="442" y="124" text-anchor="middle" font-size="12" fill="#1a56a8" font-weight="600" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">Jsoup.parse()</text>

<line x1="508" y1="121" x2="520" y2="121" stroke="#888780" stroke-width="1.5" marker-end="url(#a)"/>

<rect x="524" y="100" width="130" height="42" rx="8" fill="#e6f4ea" stroke="#34a853" stroke-width="1.2"/>
<text x="589" y="124" text-anchor="middle" font-size="12" fill="#137333" font-weight="600" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">&#x2713; 提取到正文</text>

<!-- ===== SPA 流程 ===== -->
<text x="40" y="182" font-size="13" font-weight="600" fill="#b45309" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">SPA / 防爬站（JS 动态渲染）</text>

<rect x="45" y="194" width="140" height="42" rx="8" fill="#fef7e0" stroke="#e5a000" stroke-width="1.2"/>
<text x="115" y="218" text-anchor="middle" font-size="12" fill="#b45309" font-weight="600" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">OkHttp 请求 URL</text>

<line x1="186" y1="215" x2="198" y2="215" stroke="#888780" stroke-width="1.5" marker-end="url(#a)"/>

<rect x="202" y="188" width="160" height="58" rx="8" fill="#fef7e0" stroke="#e5a000" stroke-width="1.2"/>
<text x="282" y="210" text-anchor="middle" font-size="12" fill="#b45309" font-weight="600" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">返回空壳 HTML</text>
<text x="282" y="232" text-anchor="middle" font-size="10.5" fill="#666" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">&lt;script&gt; + &lt;div id=root&gt;</text>

<line x1="363" y1="217" x2="375" y2="217" stroke="#888780" stroke-width="1.5" marker-end="url(#a)"/>

<rect x="381" y="194" width="130" height="42" rx="8" fill="#fef7e0" stroke="#e5a000" stroke-width="1.2"/>
<text x="446" y="218" text-anchor="middle" font-size="12" fill="#b45309" font-weight="600" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">Jsoup.parse()</text>

<line x1="512" y1="215" x2="524" y2="215" stroke="#888780" stroke-width="1.5" marker-end="url(#a)"/>

<rect x="528" y="194" width="130" height="42" rx="8" fill="#fce8e6" stroke="#c5221f" stroke-width="1.2"/>
<text x="593" y="218" text-anchor="middle" font-size="12" fill="#c5221f" font-weight="600" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">&#x2717; 正文为空</text>

<!-- ===== CDP 补救 ===== -->
<line x1="282" y1="248" x2="282" y2="278" stroke="#e5a000" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#a)"/>

<rect x="185" y="286" width="194" height="52" rx="8" fill="#f3e8fd" stroke="#8e24aa" stroke-width="1.2"/>
<text x="282" y="308" text-anchor="middle" font-size="12" fill="#6b21a8" font-weight="600" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">Chrome CDP 启动真实浏览器</text>
<text x="282" y="326" text-anchor="middle" font-size="10.5" fill="#555" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">执行 JS &#x2192; 等待 DOM 渲染完成</text>

<line x1="380" y1="312" x2="526" y2="312" stroke="#8e24aa" stroke-width="1.5" marker-end="url(#a)"/>

<rect x="528" y="286" width="132" height="52" rx="8" fill="#e6f4ea" stroke="#34a853" stroke-width="1.2"/>
<text x="594" y="306" text-anchor="middle" font-size="12" fill="#137333" font-weight="600" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">&#x2713; 拿到真实正文</text>
<text x="594" y="324" text-anchor="middle" font-size="10" fill="#555" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">再交给 Jsoup 提取</text>

<!-- 底部说明 -->
<rect x="30" y="358" width="620" height="98" rx="8" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
<text x="46" y="380" font-size="11.5" fill="#333" font-weight="600" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">&#x25B6; Jsoup 是 HTML 解析器，不是浏览器</text>
<text x="46" y="398" font-size="10.5" fill="#555" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">它只解析「交给它的那段静态 HTML 字符串」，不会执行 &lt;script&gt;、不会发网络请求拉数据、不等异步渲染。</text>
<text x="46" y="420" font-size="11.5" fill="#333" font-weight="600" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">&#x25B6; PaiCLI 的分层联网策略</text>
<text x="46" y="438" font-size="10.5" fill="#555" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">&#x2022; web_fetch + Jsoup = 文档站 / 博客 / 官网（SSR 页面，快且省资源）</text>
<text x="46" y="454" font-size="10.5" fill="#555" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">&#x2022; browser_connect (Chrome CDP) = SPA / 防爬站（启动真实浏览器执行 JS 后提取）</text>
</svg>