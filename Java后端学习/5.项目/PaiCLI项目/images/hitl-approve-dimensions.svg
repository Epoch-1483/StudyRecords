<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 360" width="100%" role="img">
<rect width="680" height="360" fill="#f8f9fa"/>

<text x="340" y="32" text-anchor="middle" font-size="17" font-weight="700" fill="#1f3a5f" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">HITL「全部放行」的两个维度</text>
<text x="340" y="52" text-anchor="middle" font-size="11" fill="#666" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">放行判定：isApprovedAllByTool(name) || isApprovedAllByServer(mcpServer)</text>

<!-- 工具维度 -->
<rect x="40" y="70" width="278" height="64" rx="10" fill="#e8f0fe" stroke="#1a56a8" stroke-width="1.5"/>
<text x="179" y="96" text-anchor="middle" font-size="14" font-weight="700" fill="#1a56a8" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">工具维度 approvedAllByTool</text>
<text x="179" y="118" text-anchor="middle" font-size="11" fill="#444" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">适用：内置工具 + 单个 MCP 工具</text>
<text x="179" y="133" text-anchor="middle" font-size="10" fill="#888" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">信任粒度：精确到单个操作</text>

<!-- server 维度 -->
<rect x="362" y="70" width="278" height="64" rx="10" fill="#f3e8fd" stroke="#8e24aa" stroke-width="1.5"/>
<text x="501" y="96" text-anchor="middle" font-size="14" font-weight="700" fill="#8e24aa" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">Server 维度 approvedAllByServer</text>
<text x="501" y="118" text-anchor="middle" font-size="11" fill="#444" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">仅适用：MCP 工具（按 server 聚合）</text>
<text x="501" y="133" text-anchor="middle" font-size="10" fill="#888" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">信任粒度：整 server 为单位</text>

<!-- 分隔线 -->
<line x1="339" y1="76" x2="339" y2="128" stroke="#ddd" stroke-width="1.5" stroke-dasharray="4 3"/>

<!-- 工具维度示例 -->
<rect x="40" y="154" width="278" height="46" rx="8" fill="#f5f5f5" stroke="#bbb" stroke-width="1"/>
<text x="179" y="181" text-anchor="middle" font-size="12" font-weight="600" fill="#333" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">示例：write_file（内置工具）</text>
<text x="179" y="206" text-anchor="middle" font-size="10.5" fill="#666" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">&#x2192; 工具放行 = 仅 write_file 自动通过</text>

<!-- Server 维度示例 -->
<rect x="362" y="146" width="278" height="38" rx="8" fill="#f5f5f5" stroke="#bbb" stroke-width="1"/>
<text x="501" y="171" text-anchor="middle" font-size="12" font-weight="600" fill="#333" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">示例：mcp__browser server</text>

<!-- 箭头向下 -->
<line x1="501" y1="184" x2="501" y2="198" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5"/></marker></defs>

<!-- 子工具节点 -->
<rect x="362" y="204" width="62" height="32" rx="6" fill="#ede7f6" stroke="#8e24aa" stroke-width="1"/>
<text x="393" y="224" text-anchor="middle" font-size="10" fill="#6a1b9a" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">navigate</text>

<rect x="430" y="204" width="54" height="32" rx="6" fill="#ede7f6" stroke="#8e24aa" stroke-width="1"/>
<text x="457" y="224" text-anchor="middle" font-size="10" fill="#6a1b9a" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">click</text>

<rect x="490" y="204" width="68" height="32" rx="6" fill="#ede7f6" stroke="#8e24aa" stroke-width="1"/>
<text x="524" y="224" text-anchor="middle" font-size="10" fill="#6a1b9a" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">screenshot</text>

<rect x="564" y="204" width="54" height="32" rx="6" fill="#ede7f6" stroke="#8e24aa" stroke-width="1"/>
<text x="591" y="224" text-anchor="middle" font-size="10" fill="#6a1b9a" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">fill</text>

<text x="501" y="256" text-anchor="middle" font-size="10.5" fill="#666" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">&#x2192; server 放行 = 其下所有工具一次性自动通过</text>

<!-- 底部总结 -->
<rect x="30" y="278" width="620" height="70" rx="8" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
<text x="46" y="300" font-size="11.5" fill="#333" font-weight="600" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">&#x25B6; 为什么分两个维度？</text>
<text x="46" y="318" font-size="10.5" fill="#555" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">&#x2022; MCP 工具命名 mcp__server__tool 天然带 server 分组；内置工具是单例，不存在 server 维度。</text>
<text x="46" y="336" font-size="10.5" fill="#555" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">&#x2022; 放行粒度 = 信任粒度。server 是外部第三方信任边界，可只信单个工具不信整 server。</text>
</svg>