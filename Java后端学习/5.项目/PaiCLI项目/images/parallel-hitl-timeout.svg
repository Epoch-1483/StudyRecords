<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500" font-family="'Segoe UI',system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <rect width="700" height="500" fill="#f8fafc"/>
  <text x="350" y="26" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">4 工具并行调度 × HITL 串行化 × 双层超时</text>

  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>

  <!-- LLM -->
  <rect x="30" y="44" width="160" height="42" rx="8" fill="#e0f2fe" stroke="#0369a1"/>
  <text x="110" y="62" text-anchor="middle" font-size="11" fill="#0c4a6e">LLM 一轮返回</text>
  <text x="110" y="78" text-anchor="middle" font-size="11" fill="#0c4a6e">4 个 tool_calls</text>

  <!-- executeTools -->
  <rect x="250" y="44" width="190" height="42" rx="8" fill="#ffffff" stroke="#475569"/>
  <text x="345" y="62" text-anchor="middle" font-size="11" fill="#334155">executeTools()</text>
  <text x="345" y="78" text-anchor="middle" font-size="10" fill="#94a3b8">FixedThreadPool(4) :1227</text>

  <line x1="190" y1="65" x2="248" y2="65" stroke="#475569" marker-end="url(#arr)"/>
  <line x1="345" y1="86" x2="345" y2="104" stroke="#475569" marker-end="url(#arr)"/>

  <!-- pool -->
  <rect x="210" y="104" width="320" height="300" rx="12" fill="none" stroke="#94a3b8" stroke-dasharray="6 5"/>
  <text x="220" y="120" font-size="11" fill="#64748b" font-style="italic">FixedThreadPool(4) · MAX_PARALLEL_TOOLS=4</text>

  <!-- lanes -->
  <rect x="228" y="134" width="160" height="30" rx="6" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="308" y="153" text-anchor="middle" font-size="11" fill="#713f12">execute_command</text>
  <rect x="228" y="182" width="160" height="30" rx="6" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="308" y="201" text-anchor="middle" font-size="11" fill="#713f12">write_file</text>
  <rect x="228" y="230" width="160" height="30" rx="6" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="308" y="249" text-anchor="middle" font-size="11" fill="#713f12">mcp__github__create_issue</text>
  <rect x="228" y="278" width="160" height="30" rx="6" fill="#dcfce7" stroke="#15803d"/>
  <text x="308" y="297" text-anchor="middle" font-size="11" fill="#14532d">web_fetch</text>

  <!-- 60s tag -->
  <text x="392" y="128" font-size="9" fill="#b91c1c">↳ 60s 命令超时 :1328</text>

  <!-- dangerous arrows to lock -->
  <line x1="388" y1="149" x2="540" y2="190" stroke="#475569" marker-end="url(#arr)"/>
  <line x1="388" y1="197" x2="540" y2="215" stroke="#475569" marker-end="url(#arr)"/>
  <line x1="388" y1="245" x2="540" y2="240" stroke="#475569" marker-end="url(#arr)"/>

  <!-- lock gate -->
  <rect x="548" y="168" width="128" height="108" rx="8" fill="#fee2e2" stroke="#b91c1c"/>
  <text x="612" y="190" text-anchor="middle" font-size="11" font-weight="600" fill="#7f1d1d">🔒 synchronized</text>
  <text x="612" y="206" text-anchor="middle" font-size="10" fill="#7f1d1d">requestApproval</text>
  <text x="612" y="226" text-anchor="middle" font-size="10" fill="#7f1d1d">──────</text>
  <text x="612" y="244" text-anchor="middle" font-size="10" fill="#7f1d1d">3 弹窗排队串行</text>
  <text x="612" y="260" text-anchor="middle" font-size="9" fill="#7f1d1d">(:71 一次只一个)</text>

  <!-- web_fetch direct -->
  <line x1="388" y1="293" x2="470" y2="293" stroke="#475569" marker-end="url(#arr)"/>
  <rect x="474" y="276" width="86" height="34" rx="6" fill="#dcfce7" stroke="#15803d"/>
  <text x="517" y="297" text-anchor="middle" font-size="10" fill="#14532d">直接执行 ✓</text>

  <!-- merge execute -->
  <line x1="612" y1="276" x2="612" y2="320" stroke="#475569" marker-end="url(#arr)"/>
  <line x1="517" y1="310" x2="560" y2="330" stroke="#475569" marker-end="url(#arr)"/>
  <rect x="450" y="320" width="240" height="38" rx="8" fill="#ffffff" stroke="#475569"/>
  <text x="570" y="343" text-anchor="middle" font-size="11" fill="#334155">工具执行（各线程并行，不持锁）</text>

  <!-- 90s note -->
  <text x="220" y="398" font-size="10" fill="#9a3412">90s 批次超时 invokeAll 兜底 :1246（只取消未完成的 future）</text>

  <!-- result backfill -->
  <line x1="570" y1="358" x2="570" y2="410" stroke="#475569" marker-end="url(#arr)"/>
  <rect x="190" y="412" width="340" height="46" rx="8" fill="#e0f2fe" stroke="#0369a1"/>
  <text x="360" y="432" text-anchor="middle" font-size="11" font-weight="600" fill="#0c4a6e">结果按原序回填 history</text>
  <text x="360" y="448" text-anchor="middle" font-size="10" fill="#0c4a6e">Agent.java:217-220 · 顺序与完成先后无关</text>
</svg>
