<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 540" width="100%" role="img"><title>Agent.run 的 ReAct 主循环结构</title><desc>循环前准备后进入 while(true)：THINK=chat、判断 hasToolCalls、ACT=执行工具、OBSERVE=回填历史 continue；模型不再调工具则走主退出。</desc><defs><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="340" y="34" text-anchor="middle" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="500" fill="#26215C">Agent.run() 的 ReAct 主循环（Agent.java）</text><rect x="170" y="50" width="300" height="50" rx="10" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/><text x="320" y="70" text-anchor="middle" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="500" fill="#2C2C2A">① 循环前准备  :129-149</text><text x="320" y="88" text-anchor="middle" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11.5" fill="#444441">检索记忆注入 system prompt、userInput 入 history、初始化 budget</text><line x1="320" y1="100" x2="320" y2="118" stroke="#888780" stroke-width="0.5" marker-end="url(#ar)"/><text x="360" y="114" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#5F5E5A">while(true) :153</text><rect x="170" y="120" width="300" height="58" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/><text x="320" y="142" text-anchor="middle" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="500" fill="#0C447C">思考 THINK · llmClient.chat() :183</text><text x="320" y="162" text-anchor="middle" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11.5" fill="#042C53">把完整 history + 工具定义发给模型，拿回 ChatResponse</text><line x1="320" y1="178" x2="320" y2="196" stroke="#888780" stroke-width="0.5" marker-end="url(#ar)"/><rect x="170" y="198" width="300" height="48" rx="10" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/><text x="320" y="227" text-anchor="middle" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="500" fill="#633806">response.hasToolCalls() ?  :199</text><line x1="320" y1="246" x2="320" y2="284" stroke="#888780" stroke-width="0.5" marker-end="url(#ar)"/><text x="332" y="268" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11.5" font-weight="500" fill="#993C1D">是 · 有工具</text><rect x="170" y="286" width="300" height="58" rx="10" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/><text x="320" y="308" text-anchor="middle" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="500" fill="#993C1D">行动 ACT · executeToolCalls() :216</text><text x="320" y="328" text-anchor="middle" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11.5" fill="#712B13">执行工具，HITL 审批在此触发（危险工具 / 外部 MCP）</text><line x1="320" y1="344" x2="320" y2="362" stroke="#888780" stroke-width="0.5" marker-end="url(#ar)"/><rect x="170" y="364" width="300" height="58" rx="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/><text x="320" y="386" text-anchor="middle" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="500" fill="#0F6E56">观察 OBSERVE · add(Message.tool) :219</text><text x="320" y="406" text-anchor="middle" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11.5" fill="#085041">用 toolResult.id() 配对回填历史，作下轮 THINK 的输入</text><path d="M470 393 L540 393 L540 149 L470 149" fill="none" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#ar)"/><text x="548" y="27