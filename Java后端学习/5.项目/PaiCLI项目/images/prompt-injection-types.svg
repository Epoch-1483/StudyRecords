<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 415" width="100%" role="img">
<defs>
  <marker id="arw" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect width="680" height="415" fill="#f8f9fa"/>

<text x="340" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="#1f3a5f" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">两类 Prompt 注入攻击</text>
<text x="340" y="49" text-anchor="middle" font-size="11" fill="#666" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">根因：LLM 上下文中「系统指令」与「外部数据」是同一串 token，无法天然区分</text>

<!-- ===== 直接注入 ===== -->
<text x="40" y="76" font-size="12" font-weight="600" fill="#e65100" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">直接注入：攻击者本身就是对话用户</text>

<rect x="40" y="88" width="140" height="44" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.2"/>
<text x="110" y="114" text-anchor="middle" font-size="11.5" font-weight="600" fill="#bf360c" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">恶意用户输入</text>

<line x1="181" y1="110" x2="195" y2="110" stroke="#888780" stroke-width="1.5" marker-end="url(#arw)"/>

<rect x="199" y="88" width="180" height="44" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.2"/>
<text x="289" y="114" text-anchor="middle" font-size="11" fill="#555" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">&quot;忽略上面所有指令…&quot;</text>

<line x1="380" y1="110" x2="494" y2="110" stroke="#888780" stroke-width="1.5" marker-end="url(#arw)"/>

<rect x="498" y="88" width="140" height="44" rx="8" fill="#fce8e6" stroke="#c5221f" stroke-width="1.2"/>
<text x="568" y="114" text-anchor="middle" font-size="11.5" font-weight="600" fill="#c5221f" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">越权执行 / 泄露</text>

<!-- ===== 间接注入 ===== -->
<text x="40" y="158" font-size="12" font-weight="600" fill="#c62828" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">间接注入：恶意指令藏在 Agent 读取的外部内容里（&#x26A0; 更危险）</text>

<rect x="40" y="170" width="120" height="52" rx="8" fill="#ffebee" stroke="#c62828" stroke-width="1.2"/>
<text x="100" y="192" text-anchor="middle" font-size="11" fill="#555" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">网页 / 文件</text>
<text x="100" y="210" text-anchor="middle" font-size="10" fill="#888" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">藏隐藏指令</text>

<line x1="161" y1="196" x2="175" y2="196" stroke="#888780" stroke-width="1.5" marker-end="url(#arw)"/>

<rect x="179" y="170" width="130" height="52" rx="8" fill="#ffebee" stroke="#c62828" stroke-width="1.2"/>
<text x="244" y="192" text-anchor="middle" font-size="11" fill="#555" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">web_fetch / MCP</text>
<text x="244" y="210" text-anchor="middle" font-size="10" fill="#888" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">灌进上下文</text>

<line x1="310" y1="196" x2="324" y2="196" stroke="#888780" stroke-width="1.5" marker-end="url(#arw)"/>

<rect x="328" y="170" width="120" height="52" rx="8" fill="#ffebee" stroke="#c62828" stroke-width="1.2"/>
<text x="388" y="192" text-anchor="middle" font-size="11" fill="#555" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">LLM 误当指令</text>
<text x="388" y="210" text-anchor="middle" font-size="10" fill="#888" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">执行</text>

<line x1="449" y1="196" x2="463" y2="196" stroke="#888780" stroke-width="1.5" marker-end="url(#arw)"/>

<rect x="467" y="170" width="110" height="52" rx="8" fill="#fce8e6" stroke="#c5221f" stroke-width="1.2"/>
<text x="522" y="196" text-anchor="middle" font-size="11.5" font-weight="600" fill="#c5221f" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">调危险工具</text>
<text x="522" y="212" text-anchor="middle" font-size="10" fill="#888" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">rm -rf 等</text>

<!-- 三层防御 -->
<rect x="30" y="246" width="620" height="156" rx="8" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
<text x="46" y="270" font-size="12" font-weight="700" fill="#1f3a5f" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">纵深防御（Defense in Depth）：不能根治，只能层层设卡缩小爆炸半径</text>

<!-- 第一层 -->
<rect x="46" y="282" width="175" height="34" rx="6" fill="#e8f0fe" stroke="#1a56a8" stroke-width="1"/>
<text x="134" y="303" text-anchor="middle" font-size="10.5" font-weight="600" fill="#1a56a8" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">&#x2460; 输入侧</text>
<text x="234" y="301" font-size="10" fill="#555" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">结构化定界 / 数据指令分通道 / 过滤已知模式</text>

<!-- 第二层 -->
<rect x="46" y="322" width="175" height="34" rx="6" fill="#fff8e1" stroke="#f9a825" stroke-width="1"/>
<text x="134" y="343" text-anchor="middle" font-size="10.5" font-weight="600" fill="#e65100" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">&#x2461; 模型侧</text>
<text x="234" y="341" font-size="10" fill="#555" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">指令层级 / 审查模型 guardrail / 秘密不入上下文</text>

<!-- 第三层 -->
<rect x="46" y="362" width="175" height="34" rx="6" fill="#e6f4ea" stroke="#34a853" stroke-width="1"/>
<text x="134" y="383" text-anchor="middle" font-size="10.5" font-weight="600" fill="#137333" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">&#x2462; 执行侧（最关键）</text>
<text x="234" y="381" font-size="10" fill="#555" font-family="-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">HITL 审批 + 白名单 + PathGuard/NetworkPolicy + 审计回滚</text>
</svg>
