<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 485" width="100%" role="img"><title>ReAct 循环退出条件：LLM 驱动 vs 固定轮数</title><desc>左：写死固定轮数 N 会导致截断或空转两种失败；右：主退出交给 LLM 语义判断，budget 只作兜底。</desc><text x="340" y="40" text-anchor="middle" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="500" fill="#26215C">循环的退出条件：交给 LLM 而非固定轮数</text><rect x="40" y="70" width="290" height="305" rx="12" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/><text x="185" y="95" text-anchor="middle" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="500" fill="#501313">固定轮数 N（写死）</text><text x="56" y="120" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="500" fill="#791F1F">两种必然失败</text><rect x="56" y="132" width="258" height="66" rx="8" fill="#FFFFFF" stroke="#E24B4A" stroke-width="0.5"/><text x="68" y="152" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="500" fill="#A32D2D">① N 太小 → 长任务被截断</text><text x="68" y="172" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#501313">例：重构 12 文件，第 5 步被强停</text><text x="68" y="190" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#501313">→ 输出残缺、不可用</text><rect x="56" y="210" width="258" height="80" rx="8" fill="#FFFFFF" stroke="#E24B4A" stroke-width="0.5"/><text x="68" y="230" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="500" fill="#A32D2D">② N 太大 → 简单任务空转</text><text x="68" y="250" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#501313">2 步做完却被迫续跑；模型开始</text><text x="68" y="268" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#501313">编造调用 / 凑字数，浪费 token，</text><text x="68" y="286" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#501313">还可能误触发副作用</text><text x="56" y="320" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12.5" font-weight="500" fill="#A32D2D">根本矛盾：一个 N 无法适配所有任务</text><text x="56" y="340" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11.5" fill="#791F1F">步数由输入数据决定，事先不可知</text><rect x="350" y="70" width="290" height="305" rx="12" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/><text x="495" y="95" text-anchor="middle" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="500" fill="#27500A">LLM 驱动退出 + 兜底</text><text x="366" y="120" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="500" fill="#3B6D11">主退出 = 语义判断</text><rect x="366" y="132" width="258" height="66" rx="8" fill="#FFFFFF" stroke="#639922" stroke-width="0.5"/><text x="378" y="152" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="500" fill="#3B6D11">模型看完整 history 自判『够了』</text><text x="378" y="172" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#173404">hasToolCalls()==false → 正常退出</text><text x="378" y="190" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#173404">(Agent.java:199 else 写最终答案)</text><text x="366" y="216" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="500" fill="#3B6D11">兜底 = 句法限制（保险丝）</text><rect x="366" y="228" width="258" height="86" rx="8" fill="#FFFFFF" stroke="#639922" stroke-width="0.5"/><text x="378" y="248" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12.5" font-weight="500" fill="#3B6D11">budget.check() — 防死循环 / 爆炸</text><text x="378" y="268" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#173404">· 重复调用 / 停滞检测</text><text x="378" y="286" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#173404">· token 用尽 / 超硬轮数</text><text x="378" y="304" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#173404">· CancellationContext 中断</text><text x="366" y="334" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12.5" font-weight="500" fill="#3B6D11">固定轮数只作兜底，不作正常出口</text><circle cx="340" cy="222" r="18" fill="#F1EFE8" stroke="#444441" stroke-width="0.5"/><text x="340" y="227" text-anchor="middle" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" font-weight="500" fill="#444441">VS</text><rect x="40" y="395" width="600" height="72" rx="12" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/><text x="56" y="420" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13.5" font-weight="500" fill="#0C447C">设计原则：信任 LLM 的判断力，但用护栏约束它的边界</text><text x="56" y="440" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#042C53">主退出交给模型（唯一能判『语义上是否完成』）；轮数 / Budget 只作 cost / 安全兜底。</text><text x="56" y="458" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#042C53">呼应『把 LLM 当不可信决策者，执行侧用 HITL / 护栏兜底』的 Agent 安全哲学。</text></svg>