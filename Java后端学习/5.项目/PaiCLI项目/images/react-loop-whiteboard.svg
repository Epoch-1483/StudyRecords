<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 730" font-family="'Segoe UI',system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <rect width="700" height="730" fill="#f8fafc"/>
  <text x="350" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">PaiCLI ReAct 主循环 · Agent.run()</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>

  <!-- while scope -->
  <rect x="218" y="132" width="244" height="516" rx="14" fill="none" stroke="#94a3b8" stroke-dasharray="6 5"/>
  <text x="228" y="148" font-size="12" fill="#64748b" font-style="italic">while (true) 循环体</text>

  <!-- Start -->
  <rect x="280" y="48" width="140" height="36" rx="18" fill="#e0f2fe" stroke="#0369a1"/>
  <text x="350" y="71" text-anchor="middle" font-size="13" font-weight="600" fill="#0c4a6e">Agent.run(input)</text>

  <!-- inject (outside loop) -->
  <rect x="220" y="86" width="260" height="40" rx="8" fill="#ffffff" stroke="#475569"/>
  <text x="350" y="104" text-anchor="middle" font-size="12" fill="#334155">注入记忆·Skill·LSP（循环外仅一次）</text>
  <text x="350" y="119" text-anchor="middle" font-size="10" fill="#94a3b8">Agent.java:135-143</text>

  <!-- cancellation diamond -->
  <polygon points="340,138 432,182 340,226 248,182" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="340" y="178" text-anchor="middle" font-size="11" fill="#713f12">用户取消?</text>
  <text x="340" y="194" text-anchor="middle" font-size="9" fill="#a16207">CancellationContext:154</text>

  <!-- cancel return -->
  <rect x="560" y="160" width="120" height="44" rx="8" fill="#fee2e2" stroke="#b91c1c"/>
  <text x="620" y="187" text-anchor="middle" font-size="11" fill="#7f1d1d">return ⏹️ 主动取消</text>

  <!-- compact box -->
  <rect x="200" y="250" width="280" height="42" rx="8" fill="#ffffff" stroke="#475569"/>
  <text x="340" y="268" text-anchor="middle" font-size="12" fill="#334155">maybeCompactHistory() 压缩早期历史</text>
  <text x="340" y="284" text-anchor="middle" font-size="10" fill="#94a3b8">不退出循环 · Agent.java:163</text>

  <!-- budget diamond -->
  <polygon points="340,299 438,345 340,391 242,345" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="340" y="341" text-anchor="middle" font-size="11" fill="#713f12">budget.check()</text>
  <text x="340" y="357" text-anchor="middle" font-size="9" fill="#a16207">== WITHIN_BUDGET? :164</text>

  <!-- budget return -->
  <rect x="560" y="315" width="132" height="66" rx="8" fill="#ffedd5" stroke="#c2410c"/>
  <text x="626" y="334" text-anchor="middle" font-size="11" font-weight="600" fill="#7c2d12">return ❌ 触发兜底</text>
  <text x="626" y="350" text-anchor="middle" font-size="10" fill="#9a3412">· 停滞:连续3轮同签名</text>
  <text x="626" y="364" text-anchor="middle" font-size="10" fill="#9a3412">· token ≥ 预算</text>
  <text x="626" y="378" text-anchor="middle" font-size="10" fill="#9a3412">· 迭代 ≥ 50</text>

  <!-- beginIteration box -->
  <rect x="258" y="410" width="164" height="36" rx="8" fill="#ffffff" stroke="#475569"/>
  <text x="340" y="432" text-anchor="middle" font-size="12" fill="#334155">beginIteration() :174</text>

  <!-- chat box -->
  <rect x="245" y="468" width="190" height="44" rx="8" fill="#ffffff" stroke="#475569"/>
  <text x="340" y="486" text-anchor="middle" font-size="12" fill="#334155">llmClient.chat(...)</text>
  <text x="340" y="502" text-anchor="middle" font-size="10" fill="#94a3b8">思考/行动 :183</text>

  <!-- hasToolCalls diamond -->
  <polygon points="340,534 440,580 340,626 240,580" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="340" y="576" text-anchor="middle" font-size="11" fill="#713f12">hasToolCalls()?</text>
  <text x="340" y="592" text-anchor="middle" font-size="9" fill="#a16207">Agent.java:199</text>

  <!-- execute box -->
  <rect x="560" y="553" width="132" height="54" rx="8" fill="#dcfce7" stroke="#15803d"/>
  <text x="626" y="573" text-anchor="middle" font-size="11" fill="#14532d">executeToolCalls()</text>
  <text x="626" y="589" text-anchor="middle" font-size="10" fill="#166534">结果回写历史 :216</text>

  <!-- end box -->
  <rect x="245" y="656" width="190" height="46" rx="10" fill="#e0f2fe" stroke="#0369a1"/>
  <text x="340" y="675" text-anchor="middle" font-size="12" font-weight="600" fill="#0c4a6e">add assistant(content)</text>
  <text x="340" y="692" text-anchor="middle" font-size="10" fill="#0c4a6e">return 最终回答 :252</text>

  <!-- arrows -->
  <line x1="350" y1="84" x2="350" y2="86" stroke="#475569" marker-end="url(#arr)"/>
  <line x1="350" y1="126" x2="340" y2="138" stroke="#475569" marker-end="url(#arr)"/>
  <line x1="432" y1="182" x2="558" y2="182" stroke="#475569" marker-end="url(#arr)"/>
  <text x="450" y="174" font-size="10" fill="#64748b">是</text>
  <line x1="340" y1="226" x2="340" y2="250" stroke="#475569" marker-end="url(#arr)"/>
  <line x1="340" y1="292" x2="340" y2="299" stroke="#475569" marker-end="url(#arr)"/>
  <line x1="438" y1="345" x2="558" y2="345" stroke="#475569" marker-end="url(#arr)"/>
  <text x="448" y="335" font-size="10" fill="#64748b">否·触发</text>
  <line x1="340" y1="391" x2="340" y2="410" stroke="#475569" marker-end="url(#arr)"/>
  <line x1="340" y1="446" x2="340" y2="468" stroke="#475569" marker-end="url(#arr)"/>
  <line x1="340" y1="512" x2="340" y2="534" stroke="#475569" marker-end="url(#arr)"/>
  <line x1="440" y1="580" x2="558" y2="580" stroke="#475569" marker-end="url(#arr)"/>
  <text x="452" y="572" font-size="10" fill="#64748b">是</text>
  <line x1="340" y1="626" x2="340" y2="656" stroke="#475569" marker-end="url(#arr)"/>
  <text x="300" y="648" font-size="10" fill="#64748b">否</text>
  <path d="M560,553 C700,553 700,140 356,140" fill="none" stroke="#15803d" stroke-dasharray="5 4" marker-end="url(#arr)"/>
  <text x="660" y="350" font-size="10" fill="#15803d" transform="rotate(-90 660 350)">下一轮迭代</text>
</svg>
