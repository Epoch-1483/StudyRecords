<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520" width="100%" role="img"><title>ReAct 三道保险阀的触发条件与优先级</title><desc>主退出为 LLM 不再调工具；兜底按优先级：用户取消 &gt; 停滞检测 &gt; token 预算 &gt; 硬轮数。</desc><defs><marker id="downarrow" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L5 9L8 1" fill="none" stroke="#888780" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="340" y="38" text-anchor="middle" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="500" fill="#26215C">三道保险阀的触发条件与优先级</text><rect x="120" y="56" width="440" height="50" rx="10" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/><text x="340" y="78" text-anchor="middle" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="500" fill="#27500A">主退出（正常路径，非保险阀）</text><text x="340" y="97" text-anchor="middle" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11.5" fill="#173404">模型不再调工具 → hasToolCalls()==false → 直接返回，兜底永不抢戏</text><line x1="340" y1="106" x2="340" y2="124" stroke="#888780" stroke-width="0.5" marker-end="url(#downarrow)"/><rect x="120" y="126" width="440" height="66" rx="10" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/><circle cx="150" cy="159" r="16" fill="#A32D2D"/><text x="150" y="164" text-anchor="middle" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="500" fill="#FFFFFF">1</text><text x="176" y="150" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="500" fill="#501313">① 用户取消 CancellationContext — 最高优先级</text><text x="176" y="170" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11.5" fill="#501313">触发：Ctrl+C / 点取消。检查点：循环顶 :154 ＋ LLM 返回后 :189</text><text x="176" y="188" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11.5" fill="#501313">动作：立即 return，不执行工具、不继续推理</text><line x1="340" y1="192" x2="340" y2="210" stroke="#888780" stroke-width="0.5" marker-end="url(#downarrow)"/><rect x="120" y="212" width="440" height="66" rx="10" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/><circle cx="150" cy="245" r="16" fill="#BA7517"/><text x="150" y="250" text-anchor="middle" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="500" fill="#FFFFFF">2</text><text x="176" y="236" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="500" fill="#633806">② 停滞检测 STAGNATION_DETECTED（死循环）</text><text x="176" y="256" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11.5" fill="#412402">触发：最近 3 轮『工具名＋参数』签名完全相同（recordToolCalls :107）</text><text x="176" y="274" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11.5" fill="#412402">check() 第一分支 :124，优先于 token / 轮数</text><line x1="340" y1="278" x2="340" y2="296" stroke="#888780" stroke-width="0.5" marker-end="url(#downarrow)"/><rect x="120" y="298" width="440" height="66" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/><circle cx="150" cy="331" r="16" fill="#534AB7"/><text x="150" y="336" text-anchor="middle" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="500" fill="#FFFFFF">3</text><text x="176" y="322" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="500" fill="#26215C">③ Token 预算 TOKEN_BUDGET_EXCEEDED</text><text x="176" y="342" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11.5" fill="#3C3489">触发：累计 input＋output ≥ 阈值。默认 MAX_VALUE（关闭）</text><text x="176" y="360" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11.5" fill="#3C3489">仅 -Dpaicli.react.token.budget=N 生效；check() :127</text><line x1="340" y1="364" x2="340" y2="382" stroke="#888780" stroke-width="0.5" marker-end="url(#downarrow)"/><rect x="120" y="384" width="440" height="60" rx="10" fill="#F1EFE8" stroke="#444441" stroke-width="0.5"/><circle cx="150" cy="414" r="16" fill="#444441"/><text x="150" y="419" text-anchor="middle" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="500" fill="#FFFFFF">4</text><text x="176" y="406" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="500" fill="#2C2C2A">④ 硬轮数 HARD_ITERATION_LIMIT（最终兜底）</text><text x="176" y="426" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11.5" fill="#444441">触发：迭代轮数 ≥ 50（默认）。check() 第三分支 :130</text><rect x="40" y="458" width="600" height="52" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/><text x="56" y="480" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#042C53">全部只在『模型持续调工具』时才可能触发；模型主动停 → 走主退出，兜底永不抢戏。</text><text x="56" y="500" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#042C53">默认配置下真正工作的阀：停滞(3) ＋ 硬轮数(50)；Token 阀需显式开启（CI / 批跑）。</text></svg>